<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login - E-Waste Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 25px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .form-control {
      border-radius: 15px;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: #2E7D32;
      box-shadow: 0 0 10px rgba(46, 125, 50, 0.3);
    }
    .btn-custom {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: #fff;
      border-radius: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-custom:hover {
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(46, 125, 50, 0.4);
    }
    h3 {
      font-weight: 600;
      color: #2E7D32;
    }
    a {
      text-decoration: none;
      color: #2E7D32;
    }
    a:hover {
      text-decoration: underline;
      color: #1B5E20;
    }
    .form-label {
      color: #2E7D32;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-5">
          <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt"></i> User Login</h3>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-custom w-100">Login</button>
          </form>
          <p class="text-center mt-3">Don’t have an account? <a href="user_register.html">Register</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("http://localhost:5000/api/users/login", {  // Assuming endpoint for login
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (res.ok) {
          alert("✅ Login successful!");
          localStorage.setItem("token", data.token); // Save JWT
          window.location.href = "dashboard.html"; // Redirect to dashboard or home after login
        } else {
          alert("⚠️ " + (data.message || "Login failed"));
        }
      } catch (err) {
        alert("❌ Error: " + err.message);
      }
    });
  </script>
</body>
</html>
