<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Waste Recycling Platform - Register</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #11998e, #38ef7d);
        overflow: hidden;
    }

    .register-card {
        background: #fff;
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        width: 450px;
        max-width: 95%;
        text-align: center;
        animation: slideUp 1s ease;
    }

    @keyframes slideUp {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .register-card h2 {
        margin-bottom: 20px;
        color: #333;
        font-weight: 600;
    }

    .input-group {
        position: relative;
        margin: 15px 0;
    }

    .input-group input, 
    .input-group select {
        width: 100%;
        padding: 14px 45px 14px 20px;
        border: 1px solid #ddd;
        border-radius: 10px;
        transition: 0.3s;
    }

    .input-group input:focus,
    .input-group select:focus {
        border-color: #38ef7d;
        box-shadow: 0 0 5px #38ef7d;
        outline: none;
    }

    .input-group i {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #38ef7d;
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(to right, #11998e, #38ef7d);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .login-link {
        margin-top: 15px;
        display: block;
        font-size: 14px;
        color: #11998e;
        text-decoration: none;
    }

    .login-link:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="register-card">
    <h2><i class="fas fa-leaf"></i> Register</h2>
    <form id="registerForm">
        <div class="input-group">
            <input type="text" id="fullname" placeholder="Full Name" required>
            <i class="fas fa-user"></i>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
            <i class="fas fa-envelope"></i>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-lock"></i>
        </div>
        
        <button type="submit">Register</button>
        <a href="org_login.html" class="login-link">Already have an account? Login</a>
    </form>
</div>

<script>
  const registerForm = document.getElementById('registerForm');
  registerForm.addEventListener('submit', async function(e) {
    e.preventDefault();

    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if(fullname && email && password) {
      try {
        const response = await fetch("http://localhost:5000/api/organizations/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fullname, email, password, role: "organization" })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          alert("✅ " + data.message);
          window.location.href = "org_login.html";
        } else {
          alert("❌ " + (data.message || "Registration failed"));
        }
      } catch (error) {
        console.error("Error:", error);
        alert("⚠️ Server error. Please try again later.");
      }
    } else {
      alert("Please fill in all fields!");
    }
  });
</script>

</body>
</html>
