<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Boy Tracking</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { background: #f8f9fa; }
    #map { height: 500px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .tracking-card { max-width: 900px; margin: 20px auto; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="container mt-4">
    <div class="tracking-card card p-4 shadow-sm">
      <h2 class="text-center text-primary mb-3">🚚 Live Delivery Tracking</h2>
      <p class="text-center">Track your assigned delivery boy in real-time on the map below.</p>
      <div id="map"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Get deliveryBoyId from URL (e.g. ?deliveryBoyId=DELIVERY123)
    const params = new URLSearchParams(window.location.search);
    const deliveryBoyId = params.get("deliveryBoyId") || "DELIVERY123";

    // Initialize map
    var map = L.map('map').setView([20.5937, 78.9629], 5); // Default India center
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    var marker;

    // Function to fetch location from backend (replace with real API later)
    async function fetchLocation() {
      try {
        // 🔹 Example: Replace with your backend API
        const response = await fetch(`/api/getLocation/${deliveryBoyId}`);
        const loc = await response.json();

        if (loc.lat && loc.lng) {
          if (!marker) {
            marker = L.marker([loc.lat, loc.lng]).addTo(map).bindPopup("Delivery Boy 🚴");
            map.setView([loc.lat, loc.lng], 15);
          } else {
            marker.setLatLng([loc.lat, loc.lng]);
          }
        }
      } catch (err) {
        console.error("Error fetching location:", err);
      }
    }

    // Update every 5 seconds
    setInterval(fetchLocation, 5000);
    fetchLocation();
  </script>
</body>
</html>
