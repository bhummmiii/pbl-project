<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration - E-Waste Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 25px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .form-control {
      border-radius: 15px;
      padding-left: 40px;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: #2E7D32;
      box-shadow: 0 0 10px rgba(46, 125, 50, 0.3);
    }
    .btn-custom {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: #fff;
      border-radius: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-custom:hover {
      background: linear-gradient(135deg, #2E7D32, #1B5E20);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(46, 125, 50, 0.4);
    }
    .input-icon {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      color: #2E7D32;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    h3 {
      font-weight: 600;
      color: #2E7D32;
    }
    a {
      text-decoration: none;
      color: #2E7D32;
    }
    a:hover {
      text-decoration: underline;
      color: #1B5E20;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-5">
          <h3 class="text-center mb-4"><i class="fas fa-user-plus"></i> User Registration</h3>
          <form id="registerForm">
            <div class="input-group">
              <i class="fas fa-user input-icon"></i>
              <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="input-group">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="input-group">
              <i class="fas fa-phone input-icon"></i>
              <input type="text" name="phone" class="form-control" placeholder="Phone (10 digits)" required>
            </div>
            <div class="input-group">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" name="password" class="form-control" placeholder="Password (min 6 chars)" required>
            </div>
            <button type="submit" class="btn btn-custom w-100">Register</button>
          </form>
          <p class="text-center mt-3">Already have an account? <a href="user_login.html">Login</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.querySelector('input[name="name"]').value;
      const email = document.querySelector('input[name="email"]').value;
      const phone = document.querySelector('input[name="phone"]').value;
      const password = document.querySelector('input[name="password"]').value;

      try {
        const res = await fetch("http://localhost:5000/api/users/register", {  // ✅ always goes to /api/users
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, phone, password })
        });

        const data = await res.json();
        if (res.ok) {
          alert("✅ Registration successful!");
          localStorage.setItem("token", data.token); // Save JWT
          window.location.href = "user_login.html"; // redirect after register
        } else {
          alert("⚠️ " + (data.message || "Registration failed"));
        }
      } catch (err) {
        alert("❌ Error: " + err.message);
      }
    });
  </script>
</body>
</html>
