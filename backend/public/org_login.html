<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Waste Platform - Organization Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(to right, #11998e, #38ef7d); }
    .login-card { background: #fff; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 400px; max-width: 90%; padding: 40px 30px; text-align: center; }
    .login-card h2 { margin-bottom: 30px; color: #333; font-weight: 600; }
    .login-card input { width: 100%; padding: 15px 20px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; transition: 0.3s; }
    .login-card input:focus { border-color: #38ef7d; box-shadow: 0 0 5px #38ef7d; outline: none; }
    .login-card button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 10px; background: linear-gradient(to right, #11998e, #38ef7d); color: white; font-size: 16px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .login-card button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .login-card .register-link { display: block; margin-top: 15px; font-size: 14px; color: #11998e; text-decoration: none; }
    .login-card .register-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-card">
    <h2><i class="fas fa-leaf"></i> Organization Login</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <a href="org_register.html" class="register-link">Don't have an account? Register</a>
    </form>
</div>

<script>
const loginForm = document.getElementById('loginForm');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
        alert("Please fill in both email and password!");
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/api/organizations/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
            // ✅ Store token & organizationId in localStorage (must match backend)
            localStorage.setItem("token", data.token);
            localStorage.setItem("organizationId", data.organizationId);

            alert("✅ Login successful!");
            // Redirect to organization dashboard
            window.location.href = "org_dashboard.html";
        } else {
            alert("❌ " + (data.message || "Login failed"));
        }
    } catch (err) {
        console.error("Login error:", err);
        alert("⚠️ Server error. Please try again later.");
    }
});
</script>

</body>
</html>
