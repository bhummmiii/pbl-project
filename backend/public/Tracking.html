<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Devices Tracking</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: #f8f9fa;
    }
    .tracking-card {
      max-width: 900px;
      margin: 30px auto;
    }
    .list-group-item.active {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
      font-weight: bold;
    }
    .list-group-item.completed {
      background-color: #e9f7ef;
      color: #198754;
      font-weight: 600;
    }
    .step-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .device-section {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tracking-card card p-4 shadow-sm">
      <h2 class="text-primary mb-3">📦 My Devices Tracking</h2>
      <p class="text-muted">Follow all your devices’ journey from acceptance to safe disposal.</p>

      <!-- All devices will appear here -->
      <div id="devicesContainer"></div>
    </div>
  </div>

 <script>
const token = localStorage.getItem("token");
// ✅ Use the new recycling devices endpoint
const API_URL = "http://localhost:5000/api/users/devices/recycle"; 

if (!token) {
  alert("Please login first.");
  window.location.href = "login.html";
}

// 🧩 Step 1: Fetch all recycling devices of logged-in user
async function fetchAllDevices() {
  try {
    const res = await fetch(API_URL, {
      headers: { Authorization: "Bearer " + token },
    });

    const data = await res.json();
    console.log("📦 Recycling Devices Response:", data);

    const container = document.getElementById("devicesContainer");
    container.innerHTML = "";

    if (!data.success || !data.devices || data.devices.length === 0) {
      container.innerHTML = `<p class="text-muted text-center">No recycling devices found.</p>`;
      return;
    }

    // 🧩 Step 2: Loop through each recycling device and render tracking section
    data.devices.forEach((device) => {
      const section = document.createElement("div");
      section.className = "device-section";

      section.innerHTML = `
        <div class="card p-3 shadow-sm mb-3">
          <h5 class="text-primary">${device.name || device.fullDetails?.brandModel || "Unnamed Device"}</h5>
          <p class="text-muted mb-1">Type: ${device.fullDetails?.deviceType || "Unknown"}</p>
          <p class="text-muted mb-1">Status: <strong>${device.status}</strong></p>
          <ul class="list-group mb-3" id="statusList-${device.deviceId}"></ul>

          <div class="card p-3 shadow-sm mt-3 d-none" id="deliveryTrackingCard-${device.deviceId}">
            <h6>Device Status: On the Way</h6>
            <p>Your device is currently being picked up by our delivery partner.</p>
            <a href="delivery_tracking.html?deliveryBoyId=${device.fullDetails?.assignedDeliveryBoy || ""}"
              class="btn btn-primary"
              id="deliveryLink-${device.deviceId}">
              Track Delivery Boy Live
            </a>
          </div>
        </div>
      `;

      container.appendChild(section);

      // 🧩 Step 3: Build tracking progress bar for each device
      buildTrackingUI(device.status, device.deviceId);
    });
  } catch (err) {
    console.error("❌ Error fetching devices:", err);
  }
}

// 🧩 Step 4: Build dynamic status tracker
function buildTrackingUI(deviceStatus, deviceId) {
  const statusList = document.getElementById(`statusList-${deviceId}`);
  const deliveryCard = document.getElementById(`deliveryTrackingCard-${deviceId}`);
  statusList.innerHTML = "";

  const steps = [
    "Accept",
    "Under Review",
    "Pickup Pending",
    "On the Way",
    "At Recycling Center",
    "Disposed",
  ];

  const currentIndex = steps.indexOf(deviceStatus);

  steps.forEach((step, idx) => {
    let cls = "list-group-item";
    let icon = "⏳";

    if (idx < currentIndex) {
      cls += " completed";
      icon = "✅";
    } else if (idx === currentIndex) {
      cls += " active";
      icon = "🚚";
    }

    const li = document.createElement("li");
    li.className = cls;
    li.innerHTML = `<span class="step-label">${icon} ${step}</span>`;
    statusList.appendChild(li);
  });

  // Show delivery tracking card if status is "On the Way"
  if (deviceStatus === "On the Way") {
    deliveryCard.classList.remove("d-none");
  }
}

// 🧩 Step 5: Load data on page open
fetchAllDevices();
</script>


</body>
</html>
