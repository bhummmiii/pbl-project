<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recycling Organizations - E-Waste Recycling</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 12px; }
    .org-photo { height: 200px; object-fit: cover; border-radius: 8px; }
    .leaflet-container { border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h2 class="mb-4 text-center">🏢 Recycling Organizations</h2>

    <div class="row g-4">

      <!-- Org 1 -->
      <div class="col-md-6">
        <div class="card p-3 shadow-sm">
          <img src="https://via.placeholder.com/600x200.png?text=GreenTech+Recycling" class="org-photo mb-3" alt="GreenTech Recycling">
          <h5 class="text-primary">GreenTech Recycling</h5>
          <p><strong>📞 Contact:</strong> +91 9876543210</p>
          <p><strong>📧 Email:</strong> info@greentech.com</p>
          <p><strong>⏰ Hours:</strong> Mon - Sat (9AM - 7PM)</p>
          <div id="map-org1" style="height:200px;"></div>
        </div>
      </div>

      <!-- Org 2 -->
      <div class="col-md-6">
        <div class="card p-3 shadow-sm">
          <img src="https://via.placeholder.com/600x200.png?text=E-Waste+India" class="org-photo mb-3" alt="E-Waste India">
          <h5 class="text-primary">E-Waste India</h5>
          <p><strong>📞 Contact:</strong> +91 9123456780</p>
          <p><strong>📧 Email:</strong> support@ewasteindia.org</p>
          <p><strong>⏰ Hours:</strong> Mon - Fri (10AM - 6PM)</p>
          <div id="map-org2" style="height:200px;"></div>
        </div>
      </div>

    </div>

    <div class="text-center mt-3">
      <a href="dashboard.html" class="btn btn-secondary">⬅ Back to Dashboard</a>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Org 1 Map
    var mapOrg1 = L.map('map-org1').setView([18.5204, 73.8567], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(mapOrg1);
    L.marker([18.5204, 73.8567]).addTo(mapOrg1).bindPopup("GreenTech Recycling, Pune");

    // Org 2 Map
    var mapOrg2 = L.map('map-org2').setView([19.0760, 72.8777], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(mapOrg2);
    L.marker([19.0760, 72.8777]).addTo(mapOrg2).bindPopup("E-Waste India, Mumbai");
  </script>
</body>
</html>
